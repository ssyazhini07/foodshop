<html>

<head>
    <title>Customer Tracker</title>
</head>

<body>

    <h2>Customer Service Tracker</h2>

    <input id="name" placeholder="Customer Name"><br><br>
    <input id="service" placeholder="Service"><br><br>
    <input id="amount" placeholder="Amount"><br><br>
    <input id="date" type="date"><br><br>

    <button onclick="saveData()">Save</button>

    <script>
        async function saveData() {
            const data = {
                customer_name: document.getElementById("name").value,
                service: document.getElementById("service").value,
                amount: document.getElementById("amount").value,
                due_date: document.getElementById("date").value
            };

            const res = await fetch("http://localhost:3000/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            alert(await res.text());
        }
    </script>

</body>

</html>
